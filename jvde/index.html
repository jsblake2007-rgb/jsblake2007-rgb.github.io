<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVDE — Web & App Development Studio | Pretoria, South Africa</title>
  <meta name="description" content="JVDE builds websites, web apps, mobile apps and AI features for South African businesses. Tell us what you need and get a quote — fast." />

  <!--
    ============================================================
    JVDE — single-file, self-contained, previewable React app.
    Built with React 18 + Tailwind (Play CDN) + Babel (in-browser JSX).
    Icons are small inline SVG components in the style of lucide-react,
    so nothing needs bundling — just open this file in a browser.

    👉 THINGS TO PLUG IN (search for "REPLACE:"):
       1. WHATSAPP_NUMBER  — your WhatsApp number in full intl format.
       2. FORM_ENDPOINT    — your Cloudflare Worker / form endpoint URL.
       3. Footer contact + social links.
    ============================================================
  -->

  <!-- Tailwind Play CDN (fine for a static site / preview). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Sunset-inspired palette: deep purple -> warm orange.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:    '#1c1530',   // deep near-black purple for text
            plum:   '#6d28d9',   // deep purple accent
            grape:  '#7c3aed',
            coral:  '#fb7185',
            ember:  '#f97316',   // warm orange accent
            amber:  '#f59e0b',
            sand:   '#fbf7f2',   // clean warm base
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            soft: '0 10px 30px -12px rgba(76, 29, 149, 0.25)',
            lift: '0 20px 50px -18px rgba(124, 58, 237, 0.35)',
          },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            'fade-up': 'fade-up 0.5s ease-out both',
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- React + Babel for in-browser JSX (self-contained, no build step). -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { background: #fbf7f2; }
    /* Subtle sunset gradient text helper */
    .sunset-text {
      background: linear-gradient(90deg, #6d28d9 0%, #fb7185 55%, #f97316 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sunset-bg {
      background: linear-gradient(120deg, #6d28d9 0%, #9333ea 40%, #fb7185 75%, #f97316 100%);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect } = React;

    /* =========================================================
       CONFIG — easy to edit
       ========================================================= */

    // REPLACE: your WhatsApp number, full international format, digits only.
    // South Africa example: 27 + number without leading 0  ->  "27821234567"
    const WHATSAPP_NUMBER = "27000000000";

    // REPLACE: your Cloudflare Worker / form endpoint that accepts a JSON POST.
    const FORM_ENDPOINT = "/api/submit-request";

    /* ---------------------------------------------------------
       SERVICES — edit this list freely. Each needs:
       id, title, description, and an icon name (see Icon component).
       --------------------------------------------------------- */
    const SERVICES = [
      { id: "website",   title: "Website design / redesign", desc: "A sharp, modern site that loads fast and wins trust.", icon: "layout" },
      { id: "webapp",    title: "Web application",           desc: "Dashboards, portals and tools that do real work.",   icon: "code" },
      { id: "mobile",    title: "Mobile app (iOS & Android)",desc: "One app, both stores, built to feel native.",        icon: "smartphone" },
      { id: "ai",        title: "AI integration",            desc: "Chatbots, automation and smart features that save time.", icon: "sparkles" },
      { id: "branding",  title: "Branding & visual identity",desc: "A look that stands out and stays consistent.",       icon: "palette" },
      { id: "ecommerce", title: "E-commerce / online store", desc: "Sell online with secure, smooth checkout.",          icon: "cart" },
      { id: "hosting",   title: "Hosting, maintenance & support", desc: "We keep it online, updated and healthy.",       icon: "server" },
      { id: "seo",       title: "Performance & SEO",         desc: "Faster pages and better ranking on Google.",         icon: "gauge" },
    ];

    const BUDGETS   = ["Under R5k", "R5–15k", "R15–40k", "R40k+"];
    const TIMELINES = ["ASAP", "~1 month", "2–3 months", "Flexible"];
    const CONTACT_METHODS = ["WhatsApp", "Email", "Call"];

    const STEPS = ["Services", "Project", "Your details", "Review"];

    /* =========================================================
       ICONS — minimal lucide-style inline SVGs (self-contained)
       ========================================================= */
    function Icon({ name, className = "w-6 h-6", stroke = 2 }) {
      const common = {
        className,
        viewBox: "0 0 24 24",
        fill: "none",
        stroke: "currentColor",
        strokeWidth: stroke,
        strokeLinecap: "round",
        strokeLinejoin: "round",
      };
      const paths = {
        layout: <><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></>,
        code: <><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></>,
        smartphone: <><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></>,
        sparkles: <><path d="M12 3v4M10 5h4M5 8l1 2 2 1-2 1-1 2-1-2-2-1 2-1 1-2zM17 12l1.5 3 3 1.5-3 1.5L17 22l-1.5-3-3-1.5 3-1.5L17 12z"/></>,
        palette: <><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2a10 10 0 0 0 0 20c1.1 0 2-.9 2-2 0-.5-.2-.9-.5-1.3-.3-.3-.5-.8-.5-1.2 0-1.1.9-2 2-2h2.4A4.6 4.6 0 0 0 22 10.6 10 10 0 0 0 12 2z"/></>,
        cart: <><circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.5 3H4l2.7 12.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L21 7H6"/></>,
        server: <><rect x="2" y="3" width="20" height="7" rx="2"/><rect x="2" y="14" width="20" height="7" rx="2"/><path d="M6 6.5h.01M6 17.5h.01"/></>,
        gauge: <><path d="M12 14 8 9"/><path d="M3.34 17a10 10 0 1 1 17.32 0"/><circle cx="12" cy="14" r="1.5"/></>,
        check: <><path d="M20 6 9 17l-5-5"/></>,
        arrowRight: <><path d="M5 12h14M13 6l6 6-6 6"/></>,
        arrowLeft: <><path d="M19 12H5M11 18l-6-6 6-6"/></>,
        whatsapp: <><path d="M21 11.5a8.5 8.5 0 0 1-12.6 7.5L3 21l2.1-5.3A8.5 8.5 0 1 1 21 11.5z"/><path d="M8.5 9.5c0 3 2 5 5 5.5"/></>,
        zap: <><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></>,
        rocket: <><path d="M4.5 16.5c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.8.7-2 0-2.8a2 2 0 0 0-3 0z"/><path d="M12 15 9 12a13 13 0 0 1 8-8c2 0 3 1 3 3a13 13 0 0 1-8 8z"/><path d="M9 12H5s.5-2.8 2-4c1.7-1.4 5-1 5-1M12 15v4s2.8-.5 4-2c1.4-1.7 1-5 1-5"/></>,
        map: <><path d="M12 21s-7-5.7-7-11a7 7 0 1 1 14 0c0 5.3-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></>,
        mail: <><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></>,
        phone: <><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8.1 9.5a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"/></>,
        edit: <><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></>,
        menu: <><path d="M4 6h16M4 12h16M4 18h16"/></>,
        x: <><path d="M18 6 6 18M6 6l12 12"/></>,
      };
      return <svg {...common}>{paths[name] || null}</svg>;
    }

    /* =========================================================
       Small helpers
       ========================================================= */
    function classNames(...xs) { return xs.filter(Boolean).join(" "); }

    const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    const isPhone = (v) => v.replace(/[^\d]/g, "").length >= 7;

    /* =========================================================
       NAVBAR
       ========================================================= */
    function Navbar({ onStart }) {
      const [open, setOpen] = useState(false);
      const links = [
        { href: "#services", label: "Services" },
        { href: "#why", label: "Why JVDE" },
        { href: "#builder", label: "Get a quote" },
      ];
      return (
        <header className="sticky top-0 z-40 backdrop-blur bg-sand/80 border-b border-black/5">
          <nav className="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
            <a href="#top" className="flex items-center gap-2 font-extrabold text-xl text-ink">
              <span className="w-8 h-8 rounded-lg sunset-bg inline-flex items-center justify-center text-white text-sm font-black">J</span>
              JVDE
            </a>
            <div className="hidden md:flex items-center gap-8">
              {links.map(l => (
                <a key={l.href} href={l.href} className="text-sm font-medium text-ink/70 hover:text-ink transition-colors">{l.label}</a>
              ))}
              <button onClick={onStart} className="text-sm font-semibold text-white px-4 py-2 rounded-full sunset-bg shadow-soft hover:shadow-lift transition-shadow">
                Start a project
              </button>
            </div>
            <button className="md:hidden text-ink p-2" onClick={() => setOpen(!open)} aria-label="Menu">
              <Icon name={open ? "x" : "menu"} />
            </button>
          </nav>
          {open && (
            <div className="md:hidden px-5 pb-4 flex flex-col gap-3 border-t border-black/5 bg-sand">
              {links.map(l => (
                <a key={l.href} href={l.href} onClick={() => setOpen(false)} className="text-sm font-medium text-ink/80 py-1">{l.label}</a>
              ))}
              <button onClick={() => { setOpen(false); onStart(); }} className="text-sm font-semibold text-white px-4 py-2.5 rounded-full sunset-bg text-center">
                Start a project
              </button>
            </div>
          )}
        </header>
      );
    }

    /* =========================================================
       HERO
       ========================================================= */
    function Hero({ onStart }) {
      return (
        <section id="top" className="relative overflow-hidden">
          {/* soft sunset glow */}
          <div className="absolute -top-40 -right-40 w-[34rem] h-[34rem] rounded-full sunset-bg opacity-20 blur-3xl" />
          <div className="absolute -bottom-40 -left-40 w-[28rem] h-[28rem] rounded-full bg-plum opacity-10 blur-3xl" />
          <div className="relative max-w-6xl mx-auto px-5 pt-16 pb-20 md:pt-24 md:pb-28">
            <div className="max-w-3xl animate-fade-up">
              <span className="inline-flex items-center gap-2 text-xs font-semibold tracking-wide uppercase text-plum bg-plum/10 px-3 py-1.5 rounded-full">
                <Icon name="map" className="w-4 h-4" /> Pretoria · South Africa
              </span>
              <h1 className="mt-6 text-4xl sm:text-5xl md:text-6xl font-black leading-[1.05] text-ink">
                A site or app that <span className="sunset-text">works</span> — and ships fast.
              </h1>
              <p className="mt-6 text-lg md:text-xl text-ink/70 max-w-2xl">
                JVDE designs and builds websites, web apps, mobile apps and AI features for South African businesses. Tell us what you need — we'll handle the rest.
              </p>
              <div className="mt-8 flex flex-col sm:flex-row gap-3">
                <button onClick={onStart} className="inline-flex items-center justify-center gap-2 text-base font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-lift hover:scale-[1.02] active:scale-100 transition-transform">
                  Build your project <Icon name="arrowRight" className="w-5 h-5" />
                </button>
                <a href="#services" className="inline-flex items-center justify-center gap-2 text-base font-semibold text-ink px-7 py-3.5 rounded-full bg-white border border-black/10 hover:border-plum/40 transition-colors">
                  See what we do
                </a>
              </div>
              <div className="mt-10 flex flex-wrap items-center gap-x-6 gap-y-2 text-sm text-ink/60">
                <span className="inline-flex items-center gap-1.5"><Icon name="check" className="w-4 h-4 text-ember" /> Fast turnaround</span>
                <span className="inline-flex items-center gap-1.5"><Icon name="check" className="w-4 h-4 text-ember" /> Modern stack</span>
                <span className="inline-flex items-center gap-1.5"><Icon name="check" className="w-4 h-4 text-ember" /> Local & responsive</span>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* =========================================================
       SERVICES OVERVIEW
       ========================================================= */
    function ServicesOverview({ onStart }) {
      return (
        <section id="services" className="max-w-6xl mx-auto px-5 py-16 md:py-24">
          <div className="max-w-2xl">
            <h2 className="text-3xl md:text-4xl font-black text-ink">What JVDE does</h2>
            <p className="mt-4 text-lg text-ink/70">
              Everything you need to get online and grow — design, build, launch and keep it running. Pick the bits you need; we'll quote in plain English.
            </p>
          </div>
          <div className="mt-12 grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
            {SERVICES.map((s, i) => (
              <div key={s.id} className="group bg-white rounded-2xl p-6 border border-black/5 shadow-soft hover:shadow-lift hover:-translate-y-1 transition-all"
                   style={{ animationDelay: `${i * 40}ms` }}>
                <div className="w-12 h-12 rounded-xl sunset-bg text-white inline-flex items-center justify-center">
                  <Icon name={s.icon} />
                </div>
                <h3 className="mt-4 font-bold text-ink leading-snug">{s.title}</h3>
                <p className="mt-1.5 text-sm text-ink/60">{s.desc}</p>
              </div>
            ))}
          </div>
          <div className="mt-10">
            <button onClick={onStart} className="inline-flex items-center gap-2 font-semibold text-plum hover:gap-3 transition-all">
              Start building your project <Icon name="arrowRight" className="w-5 h-5" />
            </button>
          </div>
        </section>
      );
    }

    /* =========================================================
       WHY JVDE
       ========================================================= */
    function WhyJVDE() {
      const points = [
        { icon: "rocket", title: "Fast turnaround", desc: "We move quickly and ship — no months of silence, no endless meetings." },
        { icon: "zap", title: "Modern stack", desc: "Built on current tech that's fast, secure and easy to grow with you." },
        { icon: "sparkles", title: "AI-savvy", desc: "We add chatbots, automation and smart features that actually save you time." },
        { icon: "map", title: "Local & responsive", desc: "Pretoria-based, on your timezone, and quick to reply when you need us." },
      ];
      return (
        <section id="why" className="bg-ink text-white">
          <div className="max-w-6xl mx-auto px-5 py-16 md:py-24">
            <div className="max-w-2xl">
              <h2 className="text-3xl md:text-4xl font-black">Why work with JVDE</h2>
              <p className="mt-4 text-lg text-white/70">No jargon, no drama. Just clean work that ships and keeps working.</p>
            </div>
            <div className="mt-12 grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
              {points.map(p => (
                <div key={p.title} className="rounded-2xl p-6 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                  <div className="w-11 h-11 rounded-xl sunset-bg inline-flex items-center justify-center text-white">
                    <Icon name={p.icon} className="w-5 h-5" />
                  </div>
                  <h3 className="mt-4 font-bold">{p.title}</h3>
                  <p className="mt-1.5 text-sm text-white/60">{p.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* =========================================================
       PROGRESS INDICATOR
       ========================================================= */
    function Progress({ step }) {
      return (
        <div className="flex items-center gap-2 sm:gap-3">
          {STEPS.map((label, i) => {
            const done = i < step;
            const active = i === step;
            return (
              <React.Fragment key={label}>
                <div className="flex items-center gap-2">
                  <div className={classNames(
                    "w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 transition-colors",
                    done ? "sunset-bg text-white" : active ? "bg-plum/10 text-plum ring-2 ring-plum" : "bg-black/5 text-ink/40"
                  )}>
                    {done ? <Icon name="check" className="w-4 h-4" /> : i + 1}
                  </div>
                  <span className={classNames("text-sm font-semibold hidden md:inline", active ? "text-ink" : "text-ink/40")}>{label}</span>
                </div>
                {i < STEPS.length - 1 && <div className={classNames("h-0.5 flex-1 rounded-full", done ? "sunset-bg" : "bg-black/10")} />}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    /* =========================================================
       FORM FIELD PRIMITIVES
       ========================================================= */
    function Field({ label, error, children, hint }) {
      return (
        <label className="block">
          <span className="text-sm font-semibold text-ink">{label}</span>
          {hint && <span className="block text-xs text-ink/50 mt-0.5">{hint}</span>}
          <div className="mt-1.5">{children}</div>
          {error && <span className="block mt-1 text-xs font-medium text-rose-600">{error}</span>}
        </label>
      );
    }

    const inputCls = "w-full rounded-xl border border-black/10 bg-white px-4 py-3 text-ink placeholder-ink/30 focus:outline-none focus:ring-2 focus:ring-plum/50 focus:border-plum transition";

    function Choice({ options, value, onChange }) {
      return (
        <div className="flex flex-wrap gap-2">
          {options.map(o => (
            <button type="button" key={o} onClick={() => onChange(o)}
              className={classNames(
                "px-4 py-2.5 rounded-full text-sm font-semibold border transition-all",
                value === o ? "sunset-bg text-white border-transparent shadow-soft" : "bg-white text-ink/70 border-black/10 hover:border-plum/40"
              )}>
              {o}
            </button>
          ))}
        </div>
      );
    }

    /* =========================================================
       THE PROJECT BUILDER
       ========================================================= */
    function Builder({ onDone }) {
      const [step, setStep] = useState(0);
      const [submitting, setSubmitting] = useState(false);
      const topRef = useRef(null);

      const [data, setData] = useState({
        services: [],          // array of service ids
        projectName: "",
        description: "",
        budget: "",
        timeline: "",
        name: "",
        email: "",
        phone: "",
        contactMethod: "WhatsApp",
      });

      const [errors, setErrors] = useState({});

      const update = (patch) => setData(d => ({ ...d, ...patch }));
      const toggleService = (id) =>
        setData(d => ({ ...d, services: d.services.includes(id) ? d.services.filter(x => x !== id) : [...d.services, id] }));

      // Scroll the builder into view when the step changes.
      const goto = (s) => {
        setStep(s);
        if (topRef.current) topRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      /* ---- per-step validation ---- */
      function validateStep(s) {
        const e = {};
        if (s === 0 && data.services.length === 0) e.services = "Pick at least one service to continue.";
        if (s === 1) {
          if (!data.projectName.trim()) e.projectName = "Tell us the project or business name.";
          if (!data.description.trim()) e.description = "A short description helps us quote accurately.";
          if (!data.budget) e.budget = "Choose a budget range.";
          if (!data.timeline) e.timeline = "Choose a timeline.";
        }
        if (s === 2) {
          if (!data.name.trim()) e.name = "Your name, please.";
          if (!isEmail(data.email)) e.email = "Enter a valid email address.";
          if (!isPhone(data.phone)) e.phone = "Enter a reachable phone / WhatsApp number.";
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      }

      const next = () => { if (validateStep(step)) goto(step + 1); };
      const back = () => goto(Math.max(0, step - 1));

      /* ---- build the human-readable summary (also used for WhatsApp) ---- */
      function buildSummaryText() {
        const serviceTitles = data.services.map(id => SERVICES.find(s => s.id === id)?.title).filter(Boolean);
        return [
          "🚀 *New project request — JVDE*",
          "",
          "*Services needed:*",
          ...serviceTitles.map(t => `• ${t}`),
          "",
          `*Project / business:* ${data.projectName}`,
          `*Description:* ${data.description}`,
          `*Budget:* ${data.budget}`,
          `*Timeline:* ${data.timeline}`,
          "",
          `*Name:* ${data.name}`,
          `*Email:* ${data.email}`,
          `*Phone / WhatsApp:* ${data.phone}`,
          `*Preferred contact:* ${data.contactMethod}`,
        ].join("\n");
      }

      /* ---- submit: POST to endpoint (best-effort) + open WhatsApp ---- */
      async function handleSubmit() {
        // Final guard — re-validate all gated steps.
        if (!(validateStep(0) && validateStep(1) && validateStep(2))) {
          // jump to first invalid step
          if (data.services.length === 0) return goto(0);
          if (!data.projectName || !data.description || !data.budget || !data.timeline) return goto(1);
          return goto(2);
        }

        setSubmitting(true);

        const payload = {
          ...data,
          serviceTitles: data.services.map(id => SERVICES.find(s => s.id === id)?.title).filter(Boolean),
          submittedAt: new Date().toISOString(),
          source: "jvde-website",
        };

        // 1) Endpoint fallback — never let a failure block the WhatsApp hand-off.
        try {
          await fetch(FORM_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } catch (err) {
          // Silently ignore — WhatsApp is the primary channel.
          console.warn("Endpoint POST failed (WhatsApp hand-off continues):", err);
        }

        // 2) WhatsApp primary — open a pre-filled message to the studio owner.
        const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(buildSummaryText())}`;
        window.open(waUrl, "_blank", "noopener,noreferrer");

        setSubmitting(false);
        onDone(payload);
      }

      const selectedServices = data.services.map(id => SERVICES.find(s => s.id === id)).filter(Boolean);

      return (
        <section id="builder" className="bg-sand">
          <div ref={topRef} className="max-w-3xl mx-auto px-5 py-16 md:py-24 scroll-mt-20">
            <div className="text-center mb-8">
              <h2 className="text-3xl md:text-4xl font-black text-ink">Build your project</h2>
              <p className="mt-3 text-ink/60">Four quick steps. It lands straight in our inbox.</p>
            </div>

            <div className="bg-white rounded-3xl shadow-soft border border-black/5 p-6 sm:p-8">
              <div className="mb-8"><Progress step={step} /></div>

              {/* STEP 0 — services */}
              {step === 0 && (
                <div className="animate-fade-up">
                  <h3 className="text-xl font-bold text-ink">What do you need?</h3>
                  <p className="text-sm text-ink/60 mt-1">Pick everything that applies — you can choose more than one.</p>
                  <div className="mt-6 grid sm:grid-cols-2 gap-3">
                    {SERVICES.map(s => {
                      const on = data.services.includes(s.id);
                      return (
                        <button type="button" key={s.id} onClick={() => toggleService(s.id)}
                          className={classNames(
                            "text-left rounded-2xl p-4 border-2 transition-all flex gap-3 items-start",
                            on ? "border-plum bg-plum/5 shadow-soft" : "border-black/10 bg-white hover:border-plum/40"
                          )}>
                          <div className={classNames("w-10 h-10 rounded-xl inline-flex items-center justify-center shrink-0", on ? "sunset-bg text-white" : "bg-black/5 text-ink/60")}>
                            <Icon name={s.icon} className="w-5 h-5" />
                          </div>
                          <div className="flex-1">
                            <div className="flex items-center justify-between gap-2">
                              <span className="font-semibold text-ink text-sm leading-snug">{s.title}</span>
                              <span className={classNames("w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0", on ? "sunset-bg border-transparent text-white" : "border-black/20")}>
                                {on && <Icon name="check" className="w-3 h-3" stroke={3} />}
                              </span>
                            </div>
                            <p className="text-xs text-ink/55 mt-1">{s.desc}</p>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  {errors.services && <p className="mt-3 text-sm font-medium text-rose-600">{errors.services}</p>}
                </div>
              )}

              {/* STEP 1 — project details */}
              {step === 1 && (
                <div className="animate-fade-up space-y-5">
                  <h3 className="text-xl font-bold text-ink">Tell us about the project</h3>
                  <Field label="Project / business name" error={errors.projectName}>
                    <input className={inputCls} value={data.projectName} onChange={e => update({ projectName: e.target.value })} placeholder="e.g. Thabo's Coffee Co." />
                  </Field>
                  <Field label="What do you need?" hint="Describe it in plain words — features, goals, anything we should know." error={errors.description}>
                    <textarea rows={4} className={inputCls} value={data.description} onChange={e => update({ description: e.target.value })} placeholder="We're a small coffee shop and want an online store with delivery in Pretoria..." />
                  </Field>
                  <Field label="Budget range" error={errors.budget}>
                    <Choice options={BUDGETS} value={data.budget} onChange={v => update({ budget: v })} />
                  </Field>
                  <Field label="Desired timeline" error={errors.timeline}>
                    <Choice options={TIMELINES} value={data.timeline} onChange={v => update({ timeline: v })} />
                  </Field>
                </div>
              )}

              {/* STEP 2 — your details */}
              {step === 2 && (
                <div className="animate-fade-up space-y-5">
                  <h3 className="text-xl font-bold text-ink">How do we reach you?</h3>
                  <Field label="Your name" error={errors.name}>
                    <input className={inputCls} value={data.name} onChange={e => update({ name: e.target.value })} placeholder="Full name" />
                  </Field>
                  <Field label="Email" error={errors.email}>
                    <input type="email" className={inputCls} value={data.email} onChange={e => update({ email: e.target.value })} placeholder="you@email.co.za" />
                  </Field>
                  <Field label="Phone / WhatsApp number" error={errors.phone}>
                    <input type="tel" className={inputCls} value={data.phone} onChange={e => update({ phone: e.target.value })} placeholder="082 123 4567" />
                  </Field>
                  <Field label="Preferred contact method">
                    <Choice options={CONTACT_METHODS} value={data.contactMethod} onChange={v => update({ contactMethod: v })} />
                  </Field>
                </div>
              )}

              {/* STEP 3 — review */}
              {step === 3 && (
                <div className="animate-fade-up">
                  <h3 className="text-xl font-bold text-ink">Quick review</h3>
                  <p className="text-sm text-ink/60 mt-1">Check it over, then send. We'll be in touch fast.</p>

                  <div className="mt-6 space-y-4">
                    <ReviewBlock title="Services" onEdit={() => goto(0)}>
                      <div className="flex flex-wrap gap-2">
                        {selectedServices.map(s => (
                          <span key={s.id} className="inline-flex items-center gap-1.5 text-sm font-medium text-plum bg-plum/10 px-3 py-1.5 rounded-full">
                            <Icon name={s.icon} className="w-4 h-4" /> {s.title}
                          </span>
                        ))}
                      </div>
                    </ReviewBlock>

                    <ReviewBlock title="Project" onEdit={() => goto(1)}>
                      <dl className="text-sm space-y-1.5">
                        <ReviewRow k="Name" v={data.projectName} />
                        <ReviewRow k="Description" v={data.description} />
                        <ReviewRow k="Budget" v={data.budget} />
                        <ReviewRow k="Timeline" v={data.timeline} />
                      </dl>
                    </ReviewBlock>

                    <ReviewBlock title="Your details" onEdit={() => goto(2)}>
                      <dl className="text-sm space-y-1.5">
                        <ReviewRow k="Name" v={data.name} />
                        <ReviewRow k="Email" v={data.email} />
                        <ReviewRow k="Phone" v={data.phone} />
                        <ReviewRow k="Preferred contact" v={data.contactMethod} />
                      </dl>
                    </ReviewBlock>
                  </div>

                  <p className="mt-5 text-xs text-ink/50">
                    On submit we'll open WhatsApp with your request pre-filled, and also send it to our inbox as a backup.
                  </p>
                </div>
              )}

              {/* NAV BUTTONS */}
              <div className="mt-8 flex items-center justify-between gap-3">
                {step > 0 ? (
                  <button onClick={back} className="inline-flex items-center gap-2 font-semibold text-ink/70 hover:text-ink px-4 py-3 rounded-full transition-colors">
                    <Icon name="arrowLeft" className="w-5 h-5" /> Back
                  </button>
                ) : <span />}

                {step < 3 ? (
                  <button onClick={next} className="inline-flex items-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-soft hover:shadow-lift transition-shadow">
                    Continue <Icon name="arrowRight" className="w-5 h-5" />
                  </button>
                ) : (
                  <button onClick={handleSubmit} disabled={submitting}
                    className="inline-flex items-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-lift hover:scale-[1.02] active:scale-100 transition-transform disabled:opacity-60 disabled:cursor-wait">
                    <Icon name="whatsapp" className="w-5 h-5" /> {submitting ? "Sending…" : "Send my request"}
                  </button>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function ReviewBlock({ title, onEdit, children }) {
      return (
        <div className="rounded-2xl border border-black/10 p-4 bg-sand/60">
          <div className="flex items-center justify-between">
            <h4 className="font-bold text-ink">{title}</h4>
            <button onClick={onEdit} className="inline-flex items-center gap-1 text-xs font-semibold text-plum hover:underline">
              <Icon name="edit" className="w-3.5 h-3.5" /> Edit
            </button>
          </div>
          <div className="mt-3">{children}</div>
        </div>
      );
    }

    function ReviewRow({ k, v }) {
      return (
        <div className="flex gap-2">
          <dt className="text-ink/50 w-28 shrink-0">{k}</dt>
          <dd className="text-ink font-medium break-words flex-1">{v || "—"}</dd>
        </div>
      );
    }

    /* =========================================================
       CONFIRMATION SCREEN
       ========================================================= */
    function Confirmation({ payload, onReset }) {
      const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("Hi JVDE, I just sent a project request 👋")}`;
      return (
        <section className="bg-sand">
          <div className="max-w-2xl mx-auto px-5 py-20 md:py-28 text-center animate-fade-up">
            <div className="w-20 h-20 rounded-full sunset-bg text-white inline-flex items-center justify-center shadow-lift">
              <Icon name="check" className="w-10 h-10" stroke={3} />
            </div>
            <h2 className="mt-8 text-3xl md:text-4xl font-black text-ink">Request sent — nice one, {payload?.name?.split(" ")[0] || "there"}! 🎉</h2>
            <p className="mt-4 text-lg text-ink/70">
              Your project request is on its way to us. If WhatsApp didn't open automatically, tap the button below to send it through.
            </p>
            <div className="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
              <a href={waUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-lift hover:scale-[1.02] transition-transform">
                <Icon name="whatsapp" className="w-5 h-5" /> Open WhatsApp
              </a>
              <button onClick={onReset} className="inline-flex items-center justify-center gap-2 font-semibold text-ink px-7 py-3.5 rounded-full bg-white border border-black/10 hover:border-plum/40 transition-colors">
                Start another request
              </button>
            </div>
            <p className="mt-8 text-sm text-ink/50">We usually reply within a day. Talk soon.</p>
          </div>
        </section>
      );
    }

    /* =========================================================
       FOOTER
       ========================================================= */
    function Footer() {
      return (
        <footer className="bg-ink text-white">
          <div className="max-w-6xl mx-auto px-5 py-12 grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div>
              <div className="flex items-center gap-2 font-extrabold text-xl">
                <span className="w-8 h-8 rounded-lg sunset-bg inline-flex items-center justify-center text-white text-sm font-black">J</span>
                JVDE
              </div>
              <p className="mt-3 text-sm text-white/60 max-w-xs">
                Web & app development studio in Pretoria, South Africa. Sites and apps that work and ship fast.
              </p>
            </div>
            <div>
              <h4 className="font-bold text-sm uppercase tracking-wide text-white/50">Contact</h4>
              <ul className="mt-3 space-y-2 text-sm text-white/80">
                {/* REPLACE: your real contact details */}
                <li className="flex items-center gap-2"><Icon name="mail" className="w-4 h-4 text-ember" /> hello@jvde.co.za</li>
                <li className="flex items-center gap-2"><Icon name="phone" className="w-4 h-4 text-ember" /> +27 00 000 0000</li>
                <li className="flex items-center gap-2"><Icon name="map" className="w-4 h-4 text-ember" /> Pretoria, South Africa</li>
              </ul>
            </div>
            <div>
              <h4 className="font-bold text-sm uppercase tracking-wide text-white/50">Follow</h4>
              <ul className="mt-3 space-y-2 text-sm text-white/80">
                {/* REPLACE: your real social links */}
                <li><a href="#" className="hover:text-white transition-colors">Instagram</a></li>
                <li><a href="#" className="hover:text-white transition-colors">LinkedIn</a></li>
                <li><a href="#" className="hover:text-white transition-colors">X / Twitter</a></li>
              </ul>
            </div>
          </div>
          <div className="border-t border-white/10">
            <div className="max-w-6xl mx-auto px-5 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-white/50">
              <span>© {new Date().getFullYear()} JVDE. All rights reserved.</span>
              <span>Made in Pretoria 🇿🇦</span>
            </div>
          </div>
        </footer>
      );
    }

    /* =========================================================
       APP
       ========================================================= */
    function App() {
      const [submitted, setSubmitted] = useState(null);
      const builderRef = useRef(null);

      const scrollToBuilder = () => {
        const el = document.getElementById("builder");
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      if (submitted) {
        return (
          <div className="min-h-screen flex flex-col">
            <Navbar onStart={scrollToBuilder} />
            <main className="flex-1"><Confirmation payload={submitted} onReset={() => { setSubmitted(null); window.scrollTo({ top: 0 }); }} /></main>
            <Footer />
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <Navbar onStart={scrollToBuilder} />
          <main className="flex-1">
            <Hero onStart={scrollToBuilder} />
            <ServicesOverview onStart={scrollToBuilder} />
            <WhyJVDE />
            <Builder onDone={(p) => { setSubmitted(p); window.scrollTo({ top: 0, behavior: "smooth" }); }} />
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
