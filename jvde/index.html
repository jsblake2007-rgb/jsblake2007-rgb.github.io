    function classNames(...xs) { return xs.filter(Boolean).join(" "); }
    const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    const isPhone = (v) => v.replace(/[^\d]/g, "").length >= 7;
    const easeOut = (t) => 1 - Math.pow(1 - t, 3);

    /* Reveal on scroll — fades + lifts children into view. */
    function Reveal({ children, className = "", delay = 0, y = 28 }) {
      const ref = useRef(null);
      const [shown, setShown] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el || typeof IntersectionObserver === "undefined") { setShown(true); return; }
        const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setShown(true); io.disconnect(); } }, { threshold: 0.12 });
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return (
        <div ref={ref} className={className} style={{
          opacity: shown ? 1 : 0,
          transform: shown ? "none" : `translateY(${y}px)`,
          transition: "opacity .7s ease, transform .8s cubic-bezier(.2,.7,.2,1)",
          transitionDelay: `${delay}ms`,
        }}>{children}</div>
      );
    }

    /* Count-up number that runs once it scrolls into view. */
    function CountUp({ value, suffix = "" }) {
      const ref = useRef(null);
      const [n, setN] = useState(0);
      useEffect(() => {
        const el = ref.current;
        if (!el || typeof IntersectionObserver === "undefined") { setN(value); return; }
        const io = new IntersectionObserver(([e]) => {
          if (!e.isIntersecting) return;
          io.disconnect();
          const dur = 1500, start = performance.now();
          let raf;
          const tick = (t) => {
            const p = Math.min(1, (t - start) / dur);
            setN(Math.round(easeOut(p) * value));
            if (p < 1) raf = requestAnimationFrame(tick);
          };
          raf = requestAnimationFrame(tick);
        }, { threshold: 0.4 });
        io.observe(el);
        return () => io.disconnect();
      }, [value]);
      return <span ref={ref}>{n}{suffix}</span>;
    }

    /* =========================================================

    function Aurora() {

          <div className="absolute top-1/3 -left-40 w-[30rem] h-[30rem] rounded-full bg-coral/20 blur-3xl animate-float-slow" />

    }

    function River() {
      const [dims, setDims] = useState({ w: typeof window !== "undefined" ? window.innerWidth : 1200, h: typeof window !== "undefined" ? window.innerHeight : 800 });
      const [swayX, setSwayX] = useState(0);
      const baseRef = useRef(null), tideRef = useRef(null), boatRef = useRef(null), lenRef = useRef(0), rafRef = useRef(0);
      const { w, h } = dims;
      const d =
        `M ${w * 0.30} ${-40} ` +
        `C ${w * 0.02} ${h * 0.16}, ${w * 0.66} ${h * 0.30}, ${w * 0.38} ${h * 0.48} ` +
        `S ${w * 0.06} ${h * 0.74}, ${w * 0.56} ${h * 0.90} ` +
        `S ${w * 0.88} ${h * 1.06}, ${w * 0.64} ${h + 60}`;

      const update = () => {
        const path = baseRef.current;
        if (!path || typeof path.getPointAtLength !== "function") return;
        const len = lenRef.current || 1;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
        if (tideRef.current) tideRef.current.style.strokeDashoffset = String(len * (1 - p));
        if (boatRef.current) {
          const pt = path.getPointAtLength(len * p);
          const pt2 = path.getPointAtLength(Math.min(len, len * p + 1));
          const ang = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
          boatRef.current.setAttribute("transform", `translate(${pt.x} ${pt.y}) rotate(${ang})`);
        }
      };

      useEffect(() => {
        const path = baseRef.current;
        if (!path || typeof path.getTotalLength !== "function") return;
        const len = path.getTotalLength();
        lenRef.current = len;
        if (tideRef.current) { tideRef.current.style.strokeDasharray = String(len); tideRef.current.style.strokeDashoffset = String(len); }
        update();
      }, [d]);

      useEffect(() => {
        const onScroll = () => { if (rafRef.current) return; rafRef.current = requestAnimationFrame(() => { rafRef.current = 0; update(); }); };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      useEffect(() => {
        const onResize = () => setDims({ w: window.innerWidth, h: window.innerHeight });
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);
      useEffect(() => {
        const onMove = (e) => setSwayX((e.clientX / window.innerWidth - 0.5) * 26);
        window.addEventListener("mousemove", onMove, { passive: true });
        return () => window.removeEventListener("mousemove", onMove);
      }, []);

      return (
        <div aria-hidden="true" className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
          <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="w-full h-full" style={{ transform: `translateX(${swayX}px)`, transition: "transform .5s ease-out" }}>

      const update = (patch) => setData(d => ({ ...d, ...patch }));
      const toggleService = (id) => setData(d => ({ ...d, services: d.services.includes(id) ? d.services.filter(x => x !== id) : [...d.services, id] }));
      const goto = (s) => { setStep(s); if (topRef.current) topRef.current.scrollIntoView({ behavior: "smooth", block: "start" }); };

      function validateStep(s) {
        const e = {};
        if (s === 0 && data.services.length === 0) e.services = "Pick at least one service to continue.";
        if (s === 1) {
          if (!data.projectName.trim()) e.projectName = "Tell us the project or business name.";
          if (!data.description.trim()) e.description = "A short description helps us quote accurately.";
          if (!data.budget) e.budget = "Choose a budget range.";
          if (!data.timeline) e.timeline = "Choose a timeline.";
        }
        if (s === 2) {
          if (!data.name.trim()) e.name = "Your name, please.";
          if (!isEmail(data.email)) e.email = "Enter a valid email address.";
          if (!isPhone(data.phone)) e.phone = "Enter a reachable phone / WhatsApp number.";
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      }
      const next = () => { if (validateStep(step)) goto(step + 1); };
      const back = () => goto(Math.max(0, step - 1));

      function buildSummaryText() {
        const serviceTitles = data.services.map(id => SERVICES.find(s => s.id === id)?.title).filter(Boolean);
        return [
          "🚀 *New project request — JVDE*", "", "*Services needed:*",
          ...serviceTitles.map(t => `• ${t}`), "",
          `*Project / business:* ${data.projectName}`, `*Description:* ${data.description}`,
          `*Budget:* ${data.budget}`, `*Timeline:* ${data.timeline}`, "",
          `*Name:* ${data.name}`, `*Email:* ${data.email}`, `*Phone / WhatsApp:* ${data.phone}`,
          `*Preferred contact:* ${data.contactMethod}`,
        ].join("\n");
      }

      async function handleSubmit() {
        if (!(validateStep(0) && validateStep(1) && validateStep(2))) {
          if (data.services.length === 0) return goto(0);
          if (!data.projectName || !data.description || !data.budget || !data.timeline) return goto(1);
          return goto(2);
        }
        setSubmitting(true);
        const payload = { ...data, serviceTitles: data.services.map(id => SERVICES.find(s => s.id === id)?.title).filter(Boolean), submittedAt: new Date().toISOString(), source: "jvde-website" };
        try {
          await fetch(FORM_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        } catch (err) { console.warn("Endpoint POST failed (WhatsApp hand-off continues):", err); }
        const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(buildSummaryText())}`;
        window.open(waUrl, "_blank", "noopener,noreferrer");
        setSubmitting(false);
        onDone(payload);
      }

      const selectedServices = data.services.map(id => SERVICES.find(s => s.id === id)).filter(Boolean);

      return (
        <section id="builder">
          <div ref={topRef} className="max-w-3xl mx-auto px-5 py-16 md:py-24 scroll-mt-20">
            <Reveal className="text-center mb-8">
              <h2 className="text-3xl md:text-4xl font-black text-white">Build your project</h2>
              <p className="mt-3 text-white/55">Four quick steps. It lands straight in our inbox.</p>
            </Reveal>
            <div className="glass-strong rounded-3xl p-6 sm:p-8">
              <div className="mb-8"><Progress step={step} /></div>

              {step === 0 && (
                <div className="animate-fade-up">
                  <h3 className="text-xl font-bold text-white">What do you need?</h3>
                  <p className="text-sm text-white/55 mt-1">Pick everything that applies — you can choose more than one.</p>
                  <div className="mt-6 grid sm:grid-cols-2 gap-3">
                    {SERVICES.map(s => {
                      const on = data.services.includes(s.id);
                      return (
                        <button type="button" key={s.id} onClick={() => toggleService(s.id)}
                          className={classNames("text-left rounded-2xl p-4 border-2 transition-all flex gap-3 items-start",
                            on ? "border-plum bg-plum/10 shadow-soft" : "border-white/10 bg-white/5 hover:border-plum/50")}>
                          <div className={classNames("w-10 h-10 rounded-xl inline-flex items-center justify-center shrink-0", on ? "sunset-bg text-white" : "bg-white/10 text-white/60")}><Icon name={s.icon} className="w-5 h-5" /></div>
                          <div className="flex-1">
                            <div className="flex items-center justify-between gap-2">
                              <span className="font-semibold text-white text-sm leading-snug">{s.title}</span>
                              <span className={classNames("w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0", on ? "sunset-bg border-transparent text-white" : "border-white/25")}>{on && <Icon name="check" className="w-3 h-3" stroke={3} />}</span>
                            </div>
                            <p className="text-xs text-white/50 mt-1">{s.desc}</p>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  {errors.services && <p className="mt-3 text-sm font-medium text-rose-400">{errors.services}</p>}
                </div>
              )}

              {step === 1 && (
                <div className="animate-fade-up space-y-5">
                  <h3 className="text-xl font-bold text-white">Tell us about the project</h3>
                  <Field label="Project / business name" error={errors.projectName}><input className={inputCls} value={data.projectName} onChange={e => update({ projectName: e.target.value })} placeholder="e.g. Thabo's Coffee Co." /></Field>
                  <Field label="What do you need?" hint="Describe it in plain words — features, goals, anything we should know." error={errors.description}><textarea rows={4} className={inputCls} value={data.description} onChange={e => update({ description: e.target.value })} placeholder="We're a small coffee shop and want an online store with delivery in Pretoria..." /></Field>
                  <Field label="Budget range" error={errors.budget}><Choice options={BUDGETS} value={data.budget} onChange={v => update({ budget: v })} /></Field>
                  <Field label="Desired timeline" error={errors.timeline}><Choice options={TIMELINES} value={data.timeline} onChange={v => update({ timeline: v })} /></Field>
                </div>
              )}

              {step === 2 && (
                <div className="animate-fade-up space-y-5">
                  <h3 className="text-xl font-bold text-white">How do we reach you?</h3>
                  <Field label="Your name" error={errors.name}><input className={inputCls} value={data.name} onChange={e => update({ name: e.target.value })} placeholder="Full name" /></Field>
                  <Field label="Email" error={errors.email}><input type="email" className={inputCls} value={data.email} onChange={e => update({ email: e.target.value })} placeholder="you@email.co.za" /></Field>
                  <Field label="Phone / WhatsApp number" error={errors.phone}><input type="tel" className={inputCls} value={data.phone} onChange={e => update({ phone: e.target.value })} placeholder="082 123 4567" /></Field>
                  <Field label="Preferred contact method"><Choice options={CONTACT_METHODS} value={data.contactMethod} onChange={v => update({ contactMethod: v })} /></Field>
                </div>
              )}

              {step === 3 && (
                <div className="animate-fade-up">
                  <h3 className="text-xl font-bold text-white">Quick review</h3>
                  <p className="text-sm text-white/55 mt-1">Check it over, then send. We'll be in touch fast.</p>
                  <div className="mt-6 space-y-4">
                    <ReviewBlock title="Services" onEdit={() => goto(0)}>
                      <div className="flex flex-wrap gap-2">{selectedServices.map(s => <span key={s.id} className="inline-flex items-center gap-1.5 text-sm font-medium text-white bg-plum/20 px-3 py-1.5 rounded-full"><Icon name={s.icon} className="w-4 h-4" /> {s.title}</span>)}</div>
                    </ReviewBlock>
                    <ReviewBlock title="Project" onEdit={() => goto(1)}>
                      <dl className="text-sm space-y-1.5"><ReviewRow k="Name" v={data.projectName} /><ReviewRow k="Description" v={data.description} /><ReviewRow k="Budget" v={data.budget} /><ReviewRow k="Timeline" v={data.timeline} /></dl>
                    </ReviewBlock>
                    <ReviewBlock title="Your details" onEdit={() => goto(2)}>
                      <dl className="text-sm space-y-1.5"><ReviewRow k="Name" v={data.name} /><ReviewRow k="Email" v={data.email} /><ReviewRow k="Phone" v={data.phone} /><ReviewRow k="Preferred contact" v={data.contactMethod} /></dl>
                    </ReviewBlock>
                  </div>
                  <p className="mt-5 text-xs text-white/45">On submit we'll open WhatsApp with your request pre-filled, and also send it to our inbox as a backup.</p>
                </div>
              )}

              <div className="mt-8 flex items-center justify-between gap-3">
                {step > 0 ? <button onClick={back} className="inline-flex items-center gap-2 font-semibold text-white/70 hover:text-white px-4 py-3 rounded-full transition-colors"><Icon name="arrowLeft" className="w-5 h-5" /> Back</button> : <span />}
                {step < 3
                  ? <button onClick={next} className="shine inline-flex items-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-soft hover:shadow-lift transition-shadow">Continue <Icon name="arrowRight" className="w-5 h-5" /></button>
                  : <button onClick={handleSubmit} disabled={submitting} className="shine inline-flex items-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-lift hover:scale-[1.02] active:scale-100 transition-transform disabled:opacity-60 disabled:cursor-wait"><Icon name="whatsapp" className="w-5 h-5" /> {submitting ? "Sending…" : "Send my request"}</button>}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function ReviewBlock({ title, onEdit, children }) {
      return (
        <div className="rounded-2xl border border-white/10 p-4 bg-white/[0.03]">
          <div className="flex items-center justify-between"><h4 className="font-bold text-white">{title}</h4><button onClick={onEdit} className="inline-flex items-center gap-1 text-xs font-semibold text-coral hover:underline"><Icon name="edit" className="w-3.5 h-3.5" /> Edit</button></div>
          <div className="mt-3">{children}</div>
        </div>
      );
    }
    function ReviewRow({ k, v }) {
      return <div className="flex gap-2"><dt className="text-white/45 w-28 shrink-0">{k}</dt><dd className="text-white font-medium break-words flex-1">{v || "—"}</dd></div>;
    }

    /* =========================================================
       CONFIRMATION
       ========================================================= */
    function Confirmation({ payload, onReset }) {
      const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("Hi JVDE, I just sent a project request 👋")}`;
      return (
        <section>
          <div className="max-w-2xl mx-auto px-5 py-20 md:py-28 text-center animate-fade-up">
            <div className="w-20 h-20 rounded-full sunset-bg text-white inline-flex items-center justify-center shadow-lift"><Icon name="check" className="w-10 h-10" stroke={3} /></div>
            <h2 className="mt-8 text-3xl md:text-4xl font-black text-white">Request sent — nice one, {payload?.name?.split(" ")[0] || "there"}! 🎉</h2>
            <p className="mt-4 text-lg text-white/65">Your project request is on its way to us. If WhatsApp didn't open automatically, tap the button below to send it through.</p>
            <div className="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
              <a href={waUrl} target="_blank" rel="noopener noreferrer" className="shine inline-flex items-center justify-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full sunset-bg shadow-lift hover:scale-[1.02] transition-transform"><Icon name="whatsapp" className="w-5 h-5" /> Open WhatsApp</a>
              <button onClick={onReset} className="inline-flex items-center justify-center gap-2 font-semibold text-white px-7 py-3.5 rounded-full glass-strong hover:border-plum/50 transition-colors">Start another request</button>
            </div>
            <p className="mt-8 text-sm text-white/45">We usually reply within a day. Talk soon.</p>
          </div>
        </section>
      );
    }

    /* =========================================================
       FOOTER
       ========================================================= */
    function Footer() {
      return (
        <footer className="border-t border-white/10 mt-8">
          <div className="max-w-6xl mx-auto px-5 py-12 grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div>
              <div className="flex items-center gap-2 font-extrabold text-xl text-white"><span className="w-8 h-8 rounded-lg sunset-bg inline-flex items-center justify-center text-white text-sm font-black">J</span> JVDE</div>
              <p className="mt-3 text-sm text-white/55 max-w-xs">Web & app development studio in Pretoria, South Africa. Sites and apps that work and ship fast.</p>
            </div>
            <div>
              <h4 className="font-bold text-sm uppercase tracking-wide text-white/40">Contact</h4>
              <ul className="mt-3 space-y-2 text-sm text-white/75">
                {/* REPLACE: your real contact details */}
                <li className="flex items-center gap-2"><Icon name="mail" className="w-4 h-4 text-ember" /> hello@jvde.co.za</li>
                <li className="flex items-center gap-2"><Icon name="phone" className="w-4 h-4 text-ember" /> +27 00 000 0000</li>
                <li className="flex items-center gap-2"><Icon name="map" className="w-4 h-4 text-ember" /> Pretoria, South Africa</li>
              </ul>
            </div>
            <div>
              <h4 className="font-bold text-sm uppercase tracking-wide text-white/40">Follow</h4>
              <ul className="mt-3 space-y-2 text-sm text-white/75">
                {/* REPLACE: your real social links */}
                <li><a href="#" className="hover:text-white transition-colors">Instagram</a></li>
                <li><a href="#" className="hover:text-white transition-colors">LinkedIn</a></li>
                <li><a href="#" className="hover:text-white transition-colors">X / Twitter</a></li>
              </ul>
            </div>
          </div>
          <div className="border-t border-white/10">
            <div className="max-w-6xl mx-auto px-5 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-white/45">
              <span>© {new Date().getFullYear()} JVDE. All rights reserved.</span>
              <span>Made in Pretoria 🇿🇦</span>
            </div>
          </div>
        </footer>
      );
    }

    /* =========================================================
       APP
       ========================================================= */
    function App() {
      const [submitted, setSubmitted] = useState(null);
      const scrollToBuilder = () => { const el = document.getElementById("builder"); if (el) el.scrollIntoView({ behavior: "smooth", block: "start" }); };

      const Chrome = ({ children }) => (
        <div className="min-h-screen flex flex-col">
          <Aurora /><River /><Ripples /><ScrollProgress /><WhatsAppFab />
          <div className="relative z-10 flex flex-col flex-1">{children}</div>
        </div>
      );

      if (submitted) {
        return (
          <Chrome>
            <Navbar onStart={scrollToBuilder} />
            <main className="flex-1"><Confirmation payload={submitted} onReset={() => { setSubmitted(null); window.scrollTo({ top: 0 }); }} /></main>
            <Footer />
          </Chrome>
        );
      }
      return (
        <Chrome>
          <Navbar onStart={scrollToBuilder} />
          <main className="flex-1">
            <Hero onStart={scrollToBuilder} />
            <Marquee />
            <Stats />
            <ServicesOverview onStart={scrollToBuilder} />
            <Work />
            <Process />
            <WhyJVDE />
            <Pricing onStart={scrollToBuilder} />
            <Testimonials />
            <FAQ />
            <Builder onDone={(p) => { setSubmitted(p); window.scrollTo({ top: 0, behavior: "smooth" }); }} />
          </main>
          <Footer />
        </Chrome>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
