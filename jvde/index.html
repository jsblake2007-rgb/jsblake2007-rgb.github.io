  <!--
    ============================================================
    JVDE — single-file, self-contained, previewable React app.
    Built with React 18 + Tailwind (Play CDN) + Babel (in-browser JSX).
    Icons are small inline SVG components in the style of lucide-react,
    so nothing needs bundling — just open this file in a browser.

    👉 THINGS TO PLUG IN (search for "REPLACE:"):
       1. WHATSAPP_NUMBER  — your WhatsApp number in full intl format.
       2. FORM_ENDPOINT    — your Cloudflare Worker / form endpoint URL.
       3. Footer contact + social links.
    ============================================================
  -->

  <!-- Tailwind: precompiled, static stylesheet (no runtime, works offline).
       Regenerate after editing classes:  see /build/ in the repo. -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- Web font (degrades gracefully to the system sans stack if offline). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- React + Babel, vendored locally so the site needs NO external CDN. -->
  <script src="./vendor/react.production.min.js"></script>
  <script src="./vendor/react-dom.production.min.js"></script>
  <script src="./vendor/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { background: #fbf7f2; }
    /* Subtle sunset gradient text helper */
    .sunset-text {
      background: linear-gradient(90deg, #6d28d9 0%, #fb7185 55%, #f97316 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sunset-bg {
      background: linear-gradient(120deg, #6d28d9 0%, #9333ea 40%, #fb7185 75%, #f97316 100%);
    }
    /* River: continuous "current" flow along the path */
    @keyframes riverflow { to { stroke-dashoffset: -24; } }
    /* Water ripples that spawn on tap/click */
    @keyframes ripple { to { transform: scale(9); opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .river-flow { animation: none !important; }
    }
  </style>
</head>
<body>

    /* =========================================================

       ========================================================= */

        code: <><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></>,
        smartphone: <><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></>,

        server: <><rect x="2" y="3" width="20" height="7" rx="2"/><rect x="2" y="14" width="20" height="7" rx="2"/><path d="M6 6.5h.01M6 17.5h.01"/></>,
        gauge: <><path d="M12 14 8 9"/><path d="M3.34 17a10 10 0 1 1 17.32 0"/><circle cx="12" cy="14" r="1.5"/></>,
        check: <><path d="M20 6 9 17l-5-5"/></>,

        map: <><path d="M12 21s-7-5.7-7-11a7 7 0 1 1 14 0c0 5.3-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></>,
        mail: <><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></>,

    /* =========================================================

    /* =========================================================
       PROGRESS INDICATOR
       ========================================================= */
    function Progress({ step }) {
      return (
        <div className="flex items-center gap-2 sm:gap-3">
          {STEPS.map((label, i) => {
            const done = i < step;
            const active = i === step;
            return (
              <React.Fragment key={label}>
                <div className="flex items-center gap-2">
                  <div className={classNames(
                    "w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 transition-colors",
                    done ? "sunset-bg text-white" : active ? "bg-plum/10 text-plum ring-2 ring-plum" : "bg-black/5 text-ink/40"
                  )}>
                    {done ? <Icon name="check" className="w-4 h-4" /> : i + 1}
                  </div>
                  <span className={classNames("text-sm font-semibold hidden md:inline", active ? "text-ink" : "text-ink/40")}>{label}</span>
                </div>
                {i < STEPS.length - 1 && <div className={classNames("h-0.5 flex-1 rounded-full", done ? "sunset-bg" : "bg-black/10")} />}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    /* =========================================================
       FORM FIELD PRIMITIVES
       ========================================================= */
    function Field({ label, error, children, hint }) {
      return (
        <label className="block">
          <span className="text-sm font-semibold text-ink">{label}</span>

    function Choice({ options, value, onChange }) {

        <div className="flex flex-wrap gap-2">

    /* =========================================================

       ========================================================= */

      const topRef = useRef(null);

        description: "",
        budget: "",
        timeline: "",
        name: "",
        email: "",
        phone: "",
        contactMethod: "WhatsApp",
      });

      const [errors, setErrors] = useState({});

      const update = (patch) => setData(d => ({ ...d, ...patch }));
      const toggleService = (id) =>
        setData(d => ({ ...d, services: d.services.includes(id) ? d.services.filter(x => x !== id) : [...d.services, id] }));

      // Scroll the builder into view when the step changes.
      const goto = (s) => {
        setStep(s);
        if (topRef.current) topRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      /* ---- per-step validation ---- */
      function validateStep(s) {
        const e = {};
        if (s === 0 && data.services.length === 0) e.services = "Pick at least one service to continue.";
        if (s === 1) {
          if (!data.projectName.trim()) e.projectName = "Tell us the project or business name.";
          if (!data.description.trim()) e.description = "A short description helps us quote accurately.";
          if (!data.budget) e.budget = "Choose a budget range.";
          if (!data.timeline) e.timeline = "Choose a timeline.";
        }
        if (s === 2) {
          if (!data.name.trim()) e.name = "Your name, please.";
          if (!isEmail(data.email)) e.email = "Enter a valid email address.";
          if (!isPhone(data.phone)) e.phone = "Enter a reachable phone / WhatsApp number.";
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      }

      const next = () => { if (validateStep(step)) goto(step + 1); };
      const back = () => goto(Math.max(0, step - 1));

      /* ---- build the human-readable summary (also used for WhatsApp) ---- */
      function buildSummaryText() {
        const serviceTitles = data.services.map(id => SERVICES.find(s => s.id === id)?.title).filter(Boolean);
        return [
          "🚀 *New project request — JVDE*",
          "",
          "*Services needed:*",
          ...serviceTitles.map(t => `• ${t}`),
          "",
          `*Project / business:* ${data.projectName}`,
          `*Description:* ${data.description}`,
          `*Budget:* ${data.budget}`,
          `*Timeline:* ${data.timeline}`,
          "",
          `*Name:* ${data.name}`,
          `*Email:* ${data.email}`,
          `*Phone / WhatsApp:* ${data.phone}`,
          `*Preferred contact:* ${data.contactMethod}`,
        ].join("\n");
      }

      /* ---- submit: POST to endpoint (best-effort) + open WhatsApp ---- */
      async function handleSubmit() {
        // Final guard — re-validate all gated steps.
        if (!(validateStep(0) && validateStep(1) && validateStep(2))) {
          // jump to first invalid step
          if (data.services.length === 0) return goto(0);
          if (!data.projectName || !data.description || !data.budget || !data.timeline) return goto(1);
          return goto(2);
        }

        setSubmitting(true);

        const payload = {
          ...data,
          serviceTitles: data.services.map(id => SERVICES.find(s => s.id === id)?.title).filter(Boolean),
          submittedAt: new Date().toISOString(),
          source: "jvde-website",
        };

        // 1) Endpoint fallback — never let a failure block the WhatsApp hand-off.
        try {
          await fetch(FORM_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } catch (err) {
          // Silently ignore — WhatsApp is the primary channel.
          console.warn("Endpoint POST failed (WhatsApp hand-off continues):", err);
        }

        // 2) WhatsApp primary — open a pre-filled message to the studio owner.
        const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(buildSummaryText())}`;
        window.open(waUrl, "_blank", "noopener,noreferrer");

        setSubmitting(false);
        onDone(payload);
      }

      const selectedServices = data.services.map(id => SERVICES.find(s => s.id === id)).filter(Boolean);

      return (

              {step === 0 && (

    /* =========================================================
       RIVER — a winding watercourse that flows as you scroll.
       - Fixed to the viewport, sits behind content (z-0).
       - A glowing "tide" fills the river the further down you scroll.
       - A little boat drifts along the river with your scroll position.
       - The whole river gently sways toward your cursor.
       - Always-on current animation via CSS dashes.
       It's purely decorative (pointer-events-none) so it never blocks the UI.
       ========================================================= */
    function River() {
      const [dims, setDims] = useState({
        w: typeof window !== "undefined" ? window.innerWidth : 1200,
        h: typeof window !== "undefined" ? window.innerHeight : 800,
      });
      const [swayX, setSwayX] = useState(0);

      const baseRef = useRef(null);       // measured path
      const tideRef = useRef(null);       // glowing fill that tracks scroll
      const boatRef = useRef(null);       // drifting boat group
      const lenRef = useRef(0);
      const rafRef = useRef(0);

      const { w, h } = dims;

      // A winding river path generated from the viewport size (so 1 unit = 1px).
      const d =
        `M ${w * 0.30} ${-40} ` +
        `C ${w * 0.02} ${h * 0.16}, ${w * 0.66} ${h * 0.30}, ${w * 0.38} ${h * 0.48} ` +
        `S ${w * 0.06} ${h * 0.74}, ${w * 0.56} ${h * 0.90} ` +
        `S ${w * 0.88} ${h * 1.06}, ${w * 0.64} ${h + 60}`;

      // Position the tide-fill + boat for the current scroll progress.
      const update = () => {
        const path = baseRef.current;
        // Guard: getPointAtLength is unavailable in a few odd environments.
        if (!path || typeof path.getPointAtLength !== "function") return;
        const len = lenRef.current || 1;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;

        if (tideRef.current) tideRef.current.style.strokeDashoffset = String(len * (1 - p));

        if (boatRef.current) {
          const pt = path.getPointAtLength(len * p);
          const pt2 = path.getPointAtLength(Math.min(len, len * p + 1));
          const ang = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
          boatRef.current.setAttribute("transform", `translate(${pt.x} ${pt.y}) rotate(${ang})`);
        }
      };

      // Re-measure whenever the path (viewport) changes.
      useEffect(() => {
        const path = baseRef.current;
        if (!path || typeof path.getTotalLength !== "function") return;
        const len = path.getTotalLength();
        lenRef.current = len;
        if (tideRef.current) {
          tideRef.current.style.strokeDasharray = String(len);
          tideRef.current.style.strokeDashoffset = String(len);
        }
        update();
      }, [d]);

      // Scroll → flow + boat (rAF-throttled, passive).
      useEffect(() => {
        const onScroll = () => {
          if (rafRef.current) return;
          rafRef.current = requestAnimationFrame(() => { rafRef.current = 0; update(); });
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      // Resize → rebuild path.
      useEffect(() => {
        const onResize = () => setDims({ w: window.innerWidth, h: window.innerHeight });
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);

      // Cursor → gentle sway.
      useEffect(() => {
        const onMove = (e) => setSwayX((e.clientX / window.innerWidth - 0.5) * 26);
        window.addEventListener("mousemove", onMove, { passive: true });
        return () => window.removeEventListener("mousemove", onMove);
      }, []);

      return (
        <div aria-hidden="true" className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
          <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="w-full h-full"
               style={{ transform: `translateX(${swayX}px)`, transition: "transform 0.5s ease-out" }}>
            <defs>
              <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#7c3aed" />
                <stop offset="55%" stopColor="#fb7185" />
                <stop offset="100%" stopColor="#f97316" />
              </linearGradient>
              <filter id="riverGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="7" />
              </filter>
            </defs>

            {/* soft outer glow */}
            <path d={d} fill="none" stroke="url(#riverGrad)" strokeWidth="36" strokeLinecap="round" opacity="0.10" filter="url(#riverGlow)" />
            {/* still water body (measured) */}
            <path ref={baseRef} d={d} fill="none" stroke="url(#riverGrad)" strokeWidth="16" strokeLinecap="round" opacity="0.26" />
            {/* glowing tide that fills as you scroll down */}
            <path ref={tideRef} d={d} fill="none" stroke="url(#riverGrad)" strokeWidth="16" strokeLinecap="round" opacity="0.85" filter="url(#riverGlow)" />
            {/* continuous current (animated dashes) */}
            <path className="river-flow" d={d} fill="none" stroke="#ffffff" strokeWidth="3" strokeLinecap="round"
                  opacity="0.28" style={{ strokeDasharray: "2 22", animation: "riverflow 1.4s linear infinite" }} />

            {/* the boat */}
            <g ref={boatRef}>
              <circle r="11" fill="#ffffff" opacity="0.16" />
              <path d="M -7 1 L 7 1 L 4.5 5.5 L -4.5 5.5 Z" fill="#ffffff" />
              <path d="M 0 -11 L 0 1 L 7 -3 Z" fill="#f97316" />
            </g>
          </svg>
        </div>
      );
    }

    /* =========================================================
       RIPPLES — tap / click anywhere and the water ripples out.
       Decorative overlay, never blocks clicks (pointer-events-none).
       ========================================================= */
    function Ripples() {
      const [ripples, setRipples] = useState([]);
      const idRef = useRef(0);
      useEffect(() => {
        const onClick = (e) => {
          const id = ++idRef.current;
          setRipples(r => [...r, { id, x: e.clientX, y: e.clientY }]);
          setTimeout(() => setRipples(r => r.filter(p => p.id !== id)), 900);
        };
        window.addEventListener("click", onClick);
        return () => window.removeEventListener("click", onClick);
      }, []);
      return (
        <div aria-hidden="true" className="fixed inset-0 z-50 pointer-events-none overflow-hidden">
          {ripples.map(r => (
            <span key={r.id} className="absolute rounded-full" style={{
              left: r.x, top: r.y, width: 16, height: 16, marginLeft: -8, marginTop: -8,
              border: "2px solid rgba(124,58,237,0.55)", animation: "ripple 0.9s ease-out forwards",
            }} />
          ))}
        </div>
      );
    }

    /* =========================================================
       APP
       ========================================================= */
    function App() {
      const [submitted, setSubmitted] = useState(null);
      const builderRef = useRef(null);

      const scrollToBuilder = () => {
        const el = document.getElementById("builder");
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      if (submitted) {
        return (
          <div className="min-h-screen flex flex-col">
            <River />
            <Ripples />
            <div className="relative z-10 flex-1 flex flex-col">
              <Navbar onStart={scrollToBuilder} />
              <main className="flex-1"><Confirmation payload={submitted} onReset={() => { setSubmitted(null); window.scrollTo({ top: 0 }); }} /></main>
              <Footer />
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <River />
          <Ripples />
          <div className="relative z-10 flex flex-col">
            <Navbar onStart={scrollToBuilder} />
            <main className="flex-1">
              <Hero onStart={scrollToBuilder} />
              <ServicesOverview onStart={scrollToBuilder} />
              <Process />
              <WhyJVDE />
              <Pricing onStart={scrollToBuilder} />
              <Testimonial />
              <FAQ />
              <Builder onDone={(p) => { setSubmitted(p); window.scrollTo({ top: 0, behavior: "smooth" }); }} />
            </main>
            <Footer />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
